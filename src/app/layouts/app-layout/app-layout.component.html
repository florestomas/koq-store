<div class="flex flex-row h-screen w-full overflow-hidden">
  <!-- Mobile hamburger -->
  <button
    (click)="sidebarOpen.set(true)"
    class="fixed top-4 left-4 z-30 lg:hidden bg-white rounded-full size-10 flex items-center justify-center shadow-md border border-gray-200 hover:bg-gray-50 transition cursor-pointer"
  >
    <mat-icon class="text-zinc-600">menu</mat-icon>
  </button>

  <!-- Backdrop -->
  @if (sidebarOpen()) {
    <div
      (click)="sidebarOpen.set(false)"
      class="fixed inset-0 bg-black/40 z-40 lg:hidden"
    ></div>
  }

  <app-sidebar [open]="sidebarOpen()" (close)="sidebarOpen.set(false)"></app-sidebar>
  <main class="flex-1 overflow-y-auto pt-16 lg:pt-0">
    <router-outlet></router-outlet>
  </main>
</div>
