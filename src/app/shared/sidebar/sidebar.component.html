<div class="flex flex-1/12 flex-col h-full items-start justify-start bg-white">
  <div class="flex flex-row w-full justify-between p-6 cursor-pointer" routerLink="">
    <div class="flex flex-col">
      <h1 class="text-2xl text-koq">Koq Store</h1>
      <h2 class="text-sm text-gray-900/60">INVENTARIO</h2>
    </div>
    <img class="size-14" src="koq-logo-sm.jpeg" />
  </div>

  <nav class="flex flex-col gap-0.5 w-full py-4 px-6">
    <app-nav-item
      [navLink]="'catalogo'"
      [iconName]="'inventory_2'"
      [navName]="'CATALOGO'"
    ></app-nav-item>
    @if (isAdmin()) {
      <app-nav-item
        [navLink]="'crear-producto'"
        [iconName]="'add_box'"
        [navName]="'CREAR PRODUCTO'"
      ></app-nav-item>
    }
    <app-nav-item
      [navLink]="'ventas/nueva'"
      [iconName]="'point_of_sale'"
      [navName]="'VENTAS'"
    ></app-nav-item>
    <app-nav-item
      [navLink]="'transferencia'"
      [iconName]="'local_shipping'"
      [navName]="'TRANSFERENCIA'"
    ></app-nav-item>
    <app-nav-item [navLink]="'recepciones'" [iconName]="'archive'" [navName]="'RECEPCION'" [badge]="receptionCount()" [badgeColor]="'amber'"></app-nav-item>
    <app-nav-item [navLink]="'alertas'" [iconName]="'warning'" [navName]="'ALERTAS'" [badge]="alertCount()"></app-nav-item>
    <app-nav-item
      [navLink]="'historial'"
      [iconName]="'history'"
      [navName]="'HISTORIAL'"
    ></app-nav-item>
  </nav>

  <div
    class="flex flex-col justify-start items-start p-6 gap-2 w-full mt-auto border-t-2 border-gray-300"
  >
    <div class="flex flex-row gap-x-2 items-center">
      <mat-icon>person</mat-icon>
      <p class="text-lg font-medium truncate">{{ authService.currentUser()?.user ?? 'TALLER' }}</p>
    </div>

    <app-nav-item
      [navLink]="'auth'"
      [iconName]="'logout'"
      [navName]="'CERRAR SESION'"
    ></app-nav-item>
  </div>
</div>
