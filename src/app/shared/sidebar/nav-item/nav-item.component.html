<div
  class="flex flex-row justify-start text-lg text-zinc-500 hover:bg-koq hover:text-white border-2 border-white hover:border-koq gap-2 py-3.5 pl-3.5 pr-12 rounded-full transition cursor-pointer"
  [routerLink]="navLink"
>
  <mat-icon class="material-icons-outlined">{{ iconName }}</mat-icon>
  <span>{{ navName }}</span>
  @if (badge !== null) {
    <span
      class="min-w-5 h-5 px-1.5 rounded-full bg-red-500 text-white text-[10px] font-bold flex items-center justify-center leading-none"
    >
      {{ badge }}
    </span>
  }
</div>
