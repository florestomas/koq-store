<div class="flex flex-col md:flex-row h-screen w-screen bg-white">
  <div class="flex-1">
    <img
      class="h-full w-full object-cover hidden md:block"
      alt="placeholder koq"
      src="https://placehold.co/600/ad65af/FFF?text=KoqStore\n\n\nhello+world"
    />
  </div>

  <section class="flex flex-1 flex-col justify-center items-center">
    <div class="flex flex-col border-gray-300/60 p-10 pb-10 rounded-4xl items-center">
      <img class="size-24 rounded-full" src="koq-logo-sm.jpeg" />
      <h1 class="text-5xl font-medium text-black">Bienvenido</h1>
      <h2 class="text-sm font-light text-gray-500/60 mt-1">Manejo de logistica</h2>

      <form [formGroup]="logInForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-2 mt-5 w-full">
        <div class="flex flex-row border border-gray-300/60 rounded-2xl py-2 px-3 gap-1">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-user-icon lucide-user"
          >
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <input formControlName="user" class="w-full focus:outline-0" placeholder="Usuario" type="user" />
        </div>
        <div class="flex flex-row border border-gray-300/60 rounded-2xl py-2 px-3 gap-1">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-lock-icon lucide-lock"
          >
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input formControlName="password" class="w-full focus:outline-0" placeholder="Contraseña" type="password" />
        </div>


        <button
          type="button"
          class="border border-gray-300/60 rounded-2xl p-1 bg-color-koq text-white"
          [disabled]="isLoading()"
        >
          {{isLoading() ? 'Cargando...' : 'Ingresar'}}
        </button>
      </form>
    </div>
  </section>
</div>
