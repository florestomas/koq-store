<div class="flex flex-col w-full h-full p-4 md:p-8">
  <!-- Top -->
  <div class="flex flex-col md:flex-row w-full justify-between items-start md:items-center gap-4">
    <div class="flex flex-row items-center gap-3">
      <mat-icon class="text-2xl md:text-3xl text-koq">inventory_2</mat-icon>
      <div class="flex flex-col">
        <h1 class="text-3xl md:text-5xl text-black font-medium">{{ 'Catálogo' | uppercase }}</h1>
        <div class="flex flex-row items-center text-zinc-500 gap-2">
          <mat-icon class="material-icons">warehouse</mat-icon>
          <p class="text-sm md:text-base font-light">INVENTARIO: {{ catalogService.totalInventory() }} UNIDADES</p>
        </div>
      </div>
    </div>

    <div class="flex flex-col md:flex-row items-stretch md:items-center gap-3 w-full md:w-auto">
      <app-search-bar></app-search-bar>
      <div class="flex flex-row gap-3">
        <button
          (click)="openFilters()"
          class="flex flex-row flex-1 md:flex-initial justify-center text-black! items-center gap-2 bg-zinc-500/20 px-5 py-2 rounded-full text-sm"
        >
          <mat-icon>filter_list</mat-icon>FILTROS
        </button>

        <label
          class="flex flex-row flex-1 md:flex-initial justify-center text-koq! items-center gap-2 bg-koq/20 px-5 py-2 rounded-full cursor-pointer text-sm"
        >
          ALERTAS
          <input
            class="appearance-none border rounded-full checked:bg-koq size-5 transition duration-100 cursor-pointer"
            type="checkbox"
            [checked]="catalogService.stockFilter() === 'low'"
            (change)="toggleAlerts($event)"
          />
        </label>
      </div>
    </div>
  </div>

  <nav class="flex flex-row border-b border-gray-300 pt-4 overflow-x-auto">
    <button
      (click)="catalogService.setSelectedCategory(null)"
      class="py-4 px-6 md:px-8 whitespace-nowrap text-zinc-500 font-medium tracking-widest text-sm md:text-base border-b-4 border-transparent hover:border-b-4 hover:text-koq hover:border-koq transition"
      [class.text-koq]="!catalogService.selectedCategoryId()"
      [class.border-koq]="!catalogService.selectedCategoryId()"
      [class.border-b-4]="!catalogService.selectedCategoryId()"
    >
      TODOS
    </button>
    @for (cat of catalogService.categories(); track cat.id) {
      <button
        (click)="catalogService.setSelectedCategory(cat.id)"
        class="py-4 px-6 md:px-8 whitespace-nowrap font-medium tracking-widest text-sm md:text-base border-b-4 border-transparent hover:border-b-4 hover:text-koq hover:border-koq transition"
        [class.text-koq]="catalogService.selectedCategoryId() === cat.id"
        [class.border-koq]="catalogService.selectedCategoryId() === cat.id"
        [class.text-zinc-500]="catalogService.selectedCategoryId() !== cat.id"
      >
        {{ cat.name | uppercase }}
      </button>
    }
  </nav>
  <div class="grid grid-cols-1">
    @for (item of catalogService.filteredItems(); track item.modelId) {
      <app-product-card [item]="item"></app-product-card>
    }
  </div>
</div>
